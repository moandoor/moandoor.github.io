<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Guía de bienvenida del apartamento Ven a la Playa 324 en Peñíscola.">
  <title>Ven a la Playa 324 | Guía de bienvenida</title>
  <style>
    :root {
      --ink: #243234;
      --muted: #617174;
      --paper: #ffffff;
      --mist: #f5fbfa;
      --foam: #e9f6f4;
      --sea: #2d96a3;
      --sea-deep: #176c78;
      --coral: #e96f5a;
      --sun: #f4ba50;
      --leaf: #6b985d;
      --line: rgba(36, 50, 52, 0.14);
      --shadow: 0 16px 48px rgba(36, 50, 52, 0.13);
      --radius: 8px;
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--mist);
      color: var(--ink);
      line-height: 1.58;
      overflow-x: hidden;
    }

    body::selection {
      background: rgba(244, 186, 80, 0.35);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .scroll-progress {
      position: fixed;
      inset: 0 auto auto 0;
      z-index: 50;
      width: var(--scroll-progress, 0%);
      height: 4px;
      background: linear-gradient(90deg, var(--coral), var(--sun), var(--sea));
      pointer-events: none;
    }

    .language-switcher {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 60;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 30px rgba(18, 45, 50, 0.16);
      backdrop-filter: blur(14px);
    }

    .language-switcher button {
      min-width: 42px;
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--sea-deep);
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: 800;
      letter-spacing: 0;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .language-switcher button:hover {
      background: rgba(45, 150, 163, 0.12);
    }

    .language-switcher button[aria-pressed="true"] {
      background: var(--sea-deep);
      color: #fff;
    }

    .hero {
      position: relative;
      min-height: 82svh;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      color: #fff;
      background-image:
        linear-gradient(180deg, rgba(15, 42, 47, 0.14) 0%, rgba(15, 42, 47, 0.38) 48%, rgba(15, 42, 47, 0.78) 100%),
        var(--hero-image);
      background-position: center;
      background-size: cover;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 30%;
      background: linear-gradient(180deg, rgba(245, 251, 250, 0), var(--mist));
      pointer-events: none;
    }

    .hero__content {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 108px 0 86px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--sea-deep);
      font-size: 0.79rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero .eyebrow {
      color: rgba(255, 255, 255, 0.84);
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.35);
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.08;
      letter-spacing: 0;
    }

    h1 {
      max-width: 780px;
      font-size: 2.62rem;
      text-shadow: 0 5px 30px rgba(0, 0, 0, 0.32);
    }

    h2 {
      font-size: 1.9rem;
    }

    h3 {
      font-size: 1.1rem;
    }

    p {
      margin: 0;
    }

    .hero__intro {
      max-width: 680px;
      margin-top: 18px;
      font-size: 1.08rem;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 3px 24px rgba(0, 0, 0, 0.32);
    }

    .hero__badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      backdrop-filter: blur(12px);
    }

    .hero-badge strong {
      font-size: 0.92rem;
      line-height: 1.2;
    }

    .hero-badge span {
      display: block;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.77rem;
      line-height: 1.2;
    }

    .page-section {
      padding: 54px 0;
    }

    .page-section:nth-of-type(even) {
      background: var(--paper);
    }

    .page-section:nth-of-type(odd) {
      background: var(--mist);
    }

    .section-inner {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .section-heading {
      display: grid;
      gap: 16px;
      align-items: start;
      margin-bottom: 26px;
    }

    .section-heading__icon,
    .card-icon {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: var(--radius);
      background: var(--foam);
      color: var(--sea-deep);
      flex: 0 0 auto;
    }

    .section-heading__icon svg,
    .card-icon svg,
    .inline-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .section-title {
      display: grid;
      gap: 10px;
      max-width: 820px;
    }

    .section-title p {
      color: var(--muted);
      font-size: 1.02rem;
    }

    .rule-grid,
    .info-grid,
    .access-grid,
    .restaurant-grid {
      display: grid;
      gap: 14px;
    }

    .rule-card,
    .info-card,
    .access-card,
    .restaurant-card,
    .soft-panel,
    .guide-accordion,
    .thanks-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 10px 34px rgba(36, 50, 52, 0.08);
    }

    .rule-card,
    .info-card,
    .access-card,
    .restaurant-card {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .rule-card {
      border-top: 4px solid var(--coral);
    }

    .rule-card:nth-child(2n) {
      border-top-color: var(--sea);
    }

    .rule-card:nth-child(3n) {
      border-top-color: var(--sun);
    }

    .rule-card h3,
    .info-card h3,
    .access-card h3,
    .restaurant-card h3 {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rule-card p,
    .info-card p,
    .access-card p,
    .restaurant-card p,
    .soft-panel p,
    .thanks-card p {
      color: var(--muted);
    }

    .icon-chip {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      background: rgba(45, 150, 163, 0.12);
      color: var(--sea-deep);
      flex: 0 0 auto;
    }

    .icon-chip svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .info-card strong,
    .hero-badge strong {
      color: inherit;
    }

    .info-value {
      color: var(--ink);
      font-size: 1.2rem;
      font-weight: 850;
      line-height: 1.2;
    }

    .contact-list {
      display: grid;
      gap: 8px;
      margin-top: 2px;
    }

    .contact-link {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid rgba(45, 150, 163, 0.2);
      border-radius: var(--radius);
      background: rgba(45, 150, 163, 0.08);
      color: var(--sea-deep);
      font-weight: 800;
      text-decoration: none;
    }

    .feature-stack {
      display: grid;
      gap: 18px;
    }

    .soft-panel {
      padding: 20px;
    }

    .soft-panel--accent {
      border-left: 5px solid var(--leaf);
    }

    .wifi-panel {
      display: grid;
      gap: 14px;
      padding: 20px;
      border: 1px solid rgba(45, 150, 163, 0.26);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(45, 150, 163, 0.12), rgba(244, 186, 80, 0.16));
    }

    .wifi-credentials {
      display: grid;
      gap: 10px;
    }

    .credential {
      display: grid;
      gap: 4px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.76);
    }

    .credential span {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .credential strong {
      overflow-wrap: anywhere;
      color: var(--ink);
      font-size: 1.08rem;
    }

    .copy-button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      background: var(--sea-deep);
      color: #fff;
      cursor: pointer;
      font-weight: 850;
      transition: background 180ms ease, transform 180ms ease;
    }

    .copy-button:hover {
      background: #125e69;
      transform: translateY(-1px);
    }

    .copy-button svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .step-list,
    .text-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .step-list li,
    .text-list li {
      position: relative;
      padding-left: 34px;
      color: var(--muted);
    }

    .step-list li::before {
      content: counter(step);
      counter-increment: step;
      position: absolute;
      left: 0;
      top: 0.1rem;
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--sea);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .step-list {
      counter-reset: step;
    }

    .text-list li::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 0.72rem;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--coral);
    }

    .access-card {
      border-bottom: 4px solid var(--sea);
    }

    .access-card:nth-child(2n) {
      border-bottom-color: var(--sun);
    }

    .access-card:nth-child(3n) {
      border-bottom-color: var(--coral);
    }

    .map-wrap {
      display: grid;
      gap: 18px;
    }

    .map-stage {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .map-stage svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .map-legend {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .legend-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--sea);
      flex: 0 0 auto;
    }

    .accordion-list {
      display: grid;
      gap: 12px;
    }

    .guide-accordion {
      overflow: hidden;
    }

    .guide-accordion summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 62px;
      padding: 14px 16px;
      cursor: pointer;
      font-weight: 850;
      list-style: none;
    }

    .guide-accordion summary::-webkit-details-marker {
      display: none;
    }

    .summary-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chevron {
      width: 18px;
      height: 18px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      transition: transform 180ms ease;
      color: var(--sea-deep);
      flex: 0 0 auto;
    }

    .guide-accordion[open] .chevron {
      transform: rotate(225deg);
    }

    .accordion-body {
      display: grid;
      gap: 14px;
      padding: 0 18px 18px;
      color: var(--muted);
    }

    .restaurant-card {
      border-left: 5px solid var(--sun);
    }

    .restaurant-card:nth-child(2n) {
      border-left-color: var(--sea);
    }

    .restaurant-card:nth-child(3n) {
      border-left-color: var(--coral);
    }

    .thanks-section {
      background: linear-gradient(135deg, rgba(45, 150, 163, 0.16), rgba(244, 186, 80, 0.19));
    }

    .thanks-card {
      display: grid;
      gap: 16px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.86);
    }

    .signature {
      color: var(--sea-deep);
      font-size: 1.15rem;
      font-weight: 900;
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 600ms ease, transform 600ms ease;
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .fallback {
      width: min(760px, calc(100% - 32px));
      margin: 40px auto;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    @media (min-width: 700px) {
      h1 {
        font-size: 3.7rem;
      }

      h2 {
        font-size: 2.35rem;
      }

      .hero {
        min-height: 78vh;
      }

      .section-heading {
        grid-template-columns: 56px 1fr;
      }

      .rule-grid,
      .info-grid,
      .access-grid,
      .restaurant-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .feature-stack {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .wifi-panel {
        grid-template-columns: 1fr auto;
        align-items: end;
      }

      .wifi-credentials {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .copy-button {
        width: auto;
        min-width: 190px;
        padding-inline: 20px;
      }

      .map-legend {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (min-width: 1040px) {
      .rule-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .info-grid,
      .access-grid,
      .restaurant-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 420px) {
      .language-switcher {
        top: 8px;
        right: 8px;
      }

      .language-switcher button {
        min-width: 36px;
        min-height: 34px;
        font-size: 0.78rem;
      }

      .hero__content,
      .section-inner {
        width: min(100% - 24px, 1120px);
      }

      h1 {
        font-size: 2.28rem;
      }

      h2 {
        font-size: 1.72rem;
      }

      .hero__badges {
        display: grid;
      }

      .map-legend {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

  <div class="scroll-progress" aria-hidden="true"></div>
  <div class="language-switcher" id="languageSwitcher" aria-label="Language"></div>
  <main id="app"></main>

      <h1>Ven a la Playa 324</h1>

  </noscript>

    function renderHero(content) {
      const hero = el("section", "hero");
      hero.style.setProperty("--hero-image", `url("${content.image}")`);
      hero.setAttribute("role", "img");
      hero.setAttribute("aria-label", content.imageLabel);

      const wrap = el("div", "hero__content");
      wrap.appendChild(el("p", "eyebrow", content.eyebrow));
      wrap.appendChild(el("h1", "", content.title));
      wrap.appendChild(el("p", "hero__intro", content.intro));

      const badges = el("div", "hero__badges");
      content.badges.forEach((badge) => {
        const item = el("div", "hero-badge");
        item.appendChild(iconEl(badge.icon, "inline-icon"));
        const text = el("div");
        text.appendChild(el("span", "", badge.label));
        text.appendChild(el("strong", "", badge.value));
        item.appendChild(text);
        badges.appendChild(item);
      });
      wrap.appendChild(badges);
      hero.appendChild(wrap);
      app.appendChild(hero);
    }

    function renderRules(content) {
      const shell = sectionShell({ ...content, icon: "heart" }, "rules-section");
      const grid = el("div", "rule-grid");
      content.items.forEach((item) => {
        const card = el("article", "rule-card");
        const title = el("h3");
        title.appendChild(iconEl(item.icon));
        title.appendChild(document.createTextNode(item.title));
        card.appendChild(title);
        card.appendChild(el("p", "", item.text));
        grid.appendChild(card);
      });
      shell.inner.appendChild(grid);
      app.appendChild(shell.section);
    }

    function renderBasics(content, ui) {
      const shell = sectionShell({ ...content, icon: "key" });
      const grid = el("div", "info-grid");
      content.cards.forEach((item) => {
        const card = el("article", "info-card");
        const title = el("h3");
        title.appendChild(iconEl(item.icon));
        title.appendChild(document.createTextNode(item.title));
        card.appendChild(title);
        if (item.value) card.appendChild(el("div", "info-value", item.value));
        card.appendChild(el("p", "", item.text));
        if (item.contacts) {
          const contacts = el("div", "contact-list");
          item.contacts.forEach((contact) => {
            const link = el("a", "contact-link");
            link.href = `tel:${contact.tel}`;
            link.setAttribute("aria-label", `${ui.call} ${contact.name}`);
            link.appendChild(el("span", "", contact.name));
            link.appendChild(el("strong", "", contact.phone));
            contacts.appendChild(link);
          });
          card.appendChild(contacts);
        }
        grid.appendChild(card);
      });
      shell.inner.appendChild(grid);
      app.appendChild(shell.section);
    }

    function renderWifi(content, ui) {
      const shell = sectionShell({ ...content, icon: "wifi" }, "wifi-section");
      const panel = el("div", "wifi-panel");
      const credentials = el("div", "wifi-credentials");

      const user = el("div", "credential");
      user.appendChild(el("span", "", content.userLabel));
      user.appendChild(el("strong", "", content.user));
      credentials.appendChild(user);

      const password = el("div", "credential");
      password.appendChild(el("span", "", content.passwordLabel));
      password.appendChild(el("strong", "", content.password));
      credentials.appendChild(password);

      const button = el("button", "copy-button", ui.copyPassword);
      button.type = "button";
      button.prepend(iconEl("copy", "inline-icon"));
      button.addEventListener("click", () => copyToClipboard(content.password, button, ui.copyPassword, ui.copied));

      panel.appendChild(credentials);
      panel.appendChild(button);
      shell.inner.appendChild(panel);
      app.appendChild(shell.section);
    }

    function renderPractical(content) {
      const shell = sectionShell({ ...content, icon: "pool" });
      const stack = el("div", "feature-stack");
      content.items.forEach((item) => {
        const panel = el("article", "soft-panel soft-panel--accent");
        const title = el("h3");
        title.appendChild(iconEl(item.icon));
        title.appendChild(document.createTextNode(item.title));
        panel.appendChild(title);
        panel.appendChild(el("p", "", item.text));
        if (item.steps) {
          if (item.stepsTitle) panel.appendChild(el("h3", "", item.stepsTitle));
          panel.appendChild(renderList(item.steps, "step-list"));
        }
        stack.appendChild(panel);
      });
      shell.inner.appendChild(stack);
      app.appendChild(shell.section);
    }

    function renderAccesses(content) {
      const shell = sectionShell({ ...content, icon: "beach" });
      const grid = el("div", "access-grid");
      content.cards.forEach((item) => {
        const card = el("article", "access-card");
        const title = el("h3");
        title.appendChild(iconEl(item.icon));
        title.appendChild(document.createTextNode(item.title));
        card.appendChild(title);
        card.appendChild(el("p", "", item.text));
        grid.appendChild(card);
      });
      shell.inner.appendChild(grid);

      const tip = el("div", "soft-panel");
      const title = el("h3");
      title.appendChild(iconEl("heart"));
      title.appendChild(document.createTextNode(content.tipTitle));
      tip.appendChild(title);
      tip.appendChild(el("p", "", content.tip));
      tip.style.marginTop = "18px";
      shell.inner.appendChild(tip);

      app.appendChild(shell.section);
    }

    function renderImprovement(content) {
      const shell = sectionShell({ ...content, icon: "home" });
      const panel = el("div", "soft-panel");
      panel.appendChild(el("p", "", content.text));
      shell.inner.appendChild(panel);
      app.appendChild(shell.section);
    }

    function renderMap(content) {
      const shell = sectionShell({ ...content, icon: "map" });
      const wrap = el("div", "map-wrap");
      const stage = el("div", "map-stage");
      stage.innerHTML = buildMapSvg(content.labels);
      wrap.appendChild(stage);

      const legend = el("div", "map-legend");
      const legendColors = ["#e96f5a", "#2d96a3", "#f4ba50", "#6b985d", "#956bd1", "#2f7d56", "#d0742d", "#4c798b", "#758039"];
      Object.values(content.labels).forEach((label, index) => {
        const item = el("div", "legend-item");
        const dot = el("span", "legend-dot");
        dot.style.background = legendColors[index % legendColors.length];
        item.appendChild(dot);
        item.appendChild(el("span", "", label));
        legend.appendChild(item);
      });
      wrap.appendChild(legend);
      shell.inner.appendChild(wrap);
      app.appendChild(shell.section);
    }

    function renderAccordionSection(content, iconName, listType) {
      const shell = sectionShell({ ...content, icon: iconName });
      const list = el("div", "accordion-list");
      content.groups.forEach((group) => {
        const details = el("details", "guide-accordion");
        const summary = el("summary");
        const title = el("span", "summary-title");
        title.appendChild(iconEl(group.icon || iconName));
        title.appendChild(document.createTextNode(group.title));
        summary.appendChild(title);
        summary.appendChild(el("span", "chevron"));
        details.appendChild(summary);

        const body = el("div", "accordion-body");
        if (group.steps) body.appendChild(renderList(group.steps, "step-list"));
        if (group.items) body.appendChild(renderList(group.items, listType || "text-list"));
        details.appendChild(body);
        list.appendChild(details);
      });
      shell.inner.appendChild(list);
      app.appendChild(shell.section);
    }

    function renderFavorites(content) {
      const shell = sectionShell({ ...content, icon: "utensils" });
      const highlight = el("div", "soft-panel");
      highlight.appendChild(el("p", "", content.highlight));
      shell.inner.appendChild(highlight);

      const grid = el("div", "restaurant-grid");
      grid.style.marginTop = "18px";
      content.restaurants.forEach((item) => {
        const card = el("article", "restaurant-card");
        const title = el("h3");
        title.appendChild(iconEl("utensils"));
        title.appendChild(document.createTextNode(item.name));
        card.appendChild(title);
        card.appendChild(el("p", "", item.text));
        grid.appendChild(card);
      });
      shell.inner.appendChild(grid);
      app.appendChild(shell.section);
    }

    function renderThanks(content) {
      const section = el("section", "page-section thanks-section reveal");
      const inner = el("div", "section-inner");
      const card = el("div", "thanks-card");
      card.appendChild(el("p", "eyebrow", content.eyebrow));
      card.appendChild(el("h2", "", content.title));
      appendParagraphs(card, content.paragraphs);
      card.appendChild(el("p", "signature", content.signature));
      inner.appendChild(card);
      section.appendChild(inner);
      app.appendChild(section);
    }

    function renderList(items, className) {
      const list = el(className === "text-list" ? "ul" : "ol", className);
      items.forEach((item) => list.appendChild(el("li", "", item)));
      return list;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function buildMapSvg(labels) {
      const l = Object.fromEntries(Object.entries(labels).map(([key, value]) => [key, escapeHtml(value)]));
      return `
        <svg viewBox="0 0 920 560" role="img" aria-label="${escapeHtml(labels.apartment)}">
          <defs>
            <linearGradient id="seaGradient" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0" stop-color="#7fd4df"/>
              <stop offset="1" stop-color="#2d96a3"/>
            </linearGradient>
            <pattern id="wavePattern" width="42" height="18" patternUnits="userSpaceOnUse">
              <path d="M0 9c7-8 14-8 21 0s14 8 21 0" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="2"/>
            </pattern>
          </defs>
          <rect width="920" height="560" fill="#f8fcfb"/>
          <rect x="0" y="0" width="245" height="560" fill="url(#seaGradient)"/>
          <rect x="0" y="0" width="245" height="560" fill="url(#wavePattern)" opacity=".95"/>
          <path d="M245 0c-34 92-26 164 7 226 35 66 34 144-8 236-19 42-20 76-12 98H0V0Z" fill="#f4d184"/>
          <path d="M275 0h645v560H235c-9-28-6-64 13-104 39-82 38-151 5-215-39-73-43-151 22-241Z" fill="#eef6ee"/>
          <path d="M305 66h445c43 0 78 35 78 78v246c0 43-35 78-78 78H305c-43 0-78-35-78-78V144c0-43 35-78 78-78Z" fill="#fff" stroke="#c9dfd9" stroke-width="4"/>
          <path d="M302 126h228v124H302Z" fill="#cfeadf" stroke="#91c6b6" stroke-width="3"/>
          <path d="M558 126h196v124H558Z" fill="#dcebf7" stroke="#9bc4df" stroke-width="3"/>
          <path d="M302 282h452v126H302Z" fill="#f6e7c2" stroke="#e2bf68" stroke-width="3"/>
          <path d="M498 282v126" stroke="#e2bf68" stroke-width="3"/>
          <path d="M395 126v124" stroke="#91c6b6" stroke-width="3"/>
          <path d="M80 84c30-22 71-30 107-20" stroke="#fff" stroke-width="8" opacity=".9"/>
          <path d="M84 466c35 22 78 26 116 9" stroke="#fff" stroke-width="8" opacity=".75"/>
          <path d="M245 496h560" stroke="#d5c2a4" stroke-width="18" stroke-linecap="round"/>
          <path d="M245 496h560" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-dasharray="16 18"/>

          ${mapPin(446, 212, "#e96f5a", l.apartment)}
          ${mapPin(118, 284, "#2d96a3", l.beach)}
          ${mapPin(640, 188, "#f4ba50", l.pool)}
          ${mapPin(632, 344, "#6b985d", l.tennis)}
          ${mapPin(374, 344, "#956bd1", l.parking)}
          ${mapPin(292, 450, "#2f7d56", l.showers)}
          ${mapPin(704, 458, "#d0742d", l.casaJaime)}
          ${mapPin(820, 84, "#4c798b", l.castle)}
          ${mapPin(820, 468, "#758039", l.consum)}

          <text x="53" y="42" fill="#fff" font-size="24" font-weight="800">Peñíscola</text>
          <text x="53" y="70" fill="rgba(255,255,255,.85)" font-size="15">Playa</text>
        </svg>
      `;
    }

    function mapPin(x, y, color, label) {
      return `
        <g>
          <circle cx="${x}" cy="${y}" r="18" fill="${color}" opacity=".2"/>
          <circle cx="${x}" cy="${y}" r="10" fill="${color}" stroke="#fff" stroke-width="4"/>
          <rect x="${x + 16}" y="${y - 18}" width="122" height="36" rx="8" fill="#fff" stroke="rgba(36,50,52,.16)"/>
          <text x="${x + 28}" y="${y + 5}" fill="#243234" font-size="14" font-weight="800">${label}</text>
        </g>
      `;
    }

    function renderLanguageSwitcher() {
      languageSwitcher.textContent = "";
      languages.forEach((language) => {
        const button = el("button", "", language.label);
        button.type = "button";
        button.setAttribute("aria-label", language.name);
        button.setAttribute("aria-pressed", String(language.code === currentLang));
        button.addEventListener("click", () => setLanguage(language.code));
        languageSwitcher.appendChild(button);
      });
    }

    function renderPage() {
      const content = guideContent[currentLang];
      app.textContent = "";
      document.documentElement.lang = currentLang;
      document.title = content.meta.title;
      descriptionMeta.setAttribute("content", content.meta.description);

      renderHero(content.hero);
      renderRules(content.rules);
      renderBasics(content.basics, content.meta);
      renderWifi(content.wifi, content.meta);
      renderPractical(content.practical);
      renderAccesses(content.accesses);
      renderImprovement(content.improvement);
      renderMap(content.map);
      renderAccordionSection(content.apartment, "home", "step-list");
      renderAccordionSection(content.events, "calendar", "text-list");
      renderFavorites(content.favorites);
      renderThanks(content.thanks);
      revealOnScroll();
    }

    function setLanguage(languageCode) {
      currentLang = guideContent[languageCode] ? languageCode : "es";
      try {
        localStorage.setItem("welcomeGuide.lang", currentLang);
      } catch (error) {
        // Local storage may be unavailable in private browsing.
      }
      renderLanguageSwitcher();
      renderPage();
    }

    async function copyToClipboard(text, button, defaultLabel, copiedLabel) {
      const originalContent = button.innerHTML;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const textarea = el("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
        }
        button.textContent = copiedLabel;
      } catch (error) {
        button.textContent = defaultLabel;
      }
      window.setTimeout(() => {
        button.innerHTML = originalContent;
      }, 1600);
    }

    function revealOnScroll() {
      const items = Array.from(document.querySelectorAll(".reveal"));
      if (!("IntersectionObserver" in window)) {
        items.forEach((item) => item.classList.add("is-visible"));
        return;
      }
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });
      items.forEach((item) => observer.observe(item));
    }

    function updateProgress() {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const progress = max > 0 ? (window.scrollY / max) * 100 : 0;
      document.documentElement.style.setProperty("--scroll-progress", `${progress}%`);
    }

    function init() {
      try {
        const saved = localStorage.getItem("welcomeGuide.lang");
        currentLang = guideContent[saved] ? saved : "es";
      } catch (error) {
        currentLang = "es";
      }
      renderLanguageSwitcher();
      renderPage();
      updateProgress();
      window.addEventListener("scroll", updateProgress, { passive: true });
      window.addEventListener("resize", updateProgress);
    }

    init();
  </script>
</body>
</html>
